name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          # Add any frontend env vars your Vite build needs, e.g.:
          # VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # ---------------------------------------------------------------
      # Replace the step below with your actual hosting provider.
      # Common options:
      #   - Vercel:  use `amondnet/vercel-action`
      #   - Netlify: use `nwtgck/actions-netlify`
      #   - S3/CloudFront: use `aws-actions` + `aws s3 sync dist/ s3://...`
      # ---------------------------------------------------------------
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: deploy-frontend   # remove this line if backend deploy is independent

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # Replace the steps below with your actual deployment target.
      # Common options:
      #   - Render / Railway: trigger a deploy hook via curl
      #   - EC2 / VPS: use `appleboy/ssh-action` to SSH in and restart
      #   - Heroku: use `akhileshns/heroku-deploy`
      # Example for a generic deploy webhook:
      # - name: Trigger deploy
      #   run: curl -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}"
      # ---------------------------------------------------------------
      - name: Deploy backend (configure this step)
        run: echo "Configure your backend deployment here."
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          # Add any other backend secrets your server needs
